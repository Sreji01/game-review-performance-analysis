spring.application.name=game-marketplace-analytics

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/game_marketplace_analytics?currentSchema=normalized}
spring.datasource.username=${DB_USERNAME:${USER:postgres}}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=org.postgresql.Driver

# SQL scripts own the schema so performance experiments remain explicit and reproducible.
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.default_schema=normalized
spring.jpa.open-in-view=false
spring.sql.init.mode=never
